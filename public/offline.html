<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Leshiy-AI - Offline</title>
    <style>
        /* Настройка всей страницы */
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center; /* Центрирует по горизонтали */
            align-items: center;     /* Центрирует по вертикали */
            background-color: #f5f5f5; /* Цвет фона, как на твоем скрине */
            font-family: sans-serif;
        }

        /* Настройка контейнера с контентом */
        .box {
            display: flex;
            flex-direction: column; /* Ставим элементы друг под другом */
            align-items: center;    /* Центрируем элементы внутри колонки */
            text-align: center;     /* Текст тоже по центру */
            padding: 20px;
        }

        .icon-container {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-icon {
            max-width: 100%;
            max-height: 100%;
        }

        h1 { margin: 10px 0; }
        p { margin: 5px 0 20px 0; color: #333; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #0077FF; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="box">
        <div class="icon-container">
            <img src="/Gemini.png" alt="Leshiy AI Icon" class="app-icon">
        </div>
        <h1>Нет соединения</h1>
        <p>Для работы Leshiy-AI требуется интернет.</p>
        <button onclick="window.location.href = '/';">Попробовать снова</button>
    </div>
</body>
</html>
