<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
    <script>
        // Берем параметры (code, state и т.д.)
        const params = window.location.search;
        // Прыгаем по схеме, которую Chrome НЕ умеет открывать сам
        // Используем твой ID приложения
        window.location.href = "com.leshiy_ai.app://auth" + params;
        
        // На всякий случай кнопка, если авто-прыжок заблокирован
        setTimeout(() => {
            document.body.innerHTML = '<center><a href="com.leshiy_ai.app://auth' + params + '" style="font-size:20px;">ВЕРНУТЬСЯ В ПРИЛОЖЕНИЕ</a></center>';
        }, 500);
    </script>
</body>
</html>
