<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
    <script>
        const params = window.location.search;
        // Важно: никакой конкатенации путей, только чистая схема!
        const targetUrl = "com.leshiy_ai.app://auth" + params;
        
        // Попытка прыжка
        window.location.replace(targetUrl);

        // Если через секунду мы всё еще тут - рисуем кнопку-спасатель
        setTimeout(() => {
            document.body.innerHTML = `
                <div style="text-align:center; margin-top:50px; font-family:sans-serif;">
                    <h2>Авторизация...</h2>
                    <a href="${targetUrl}" style="padding:15px 25px; background:#0077FF; color:white; text-decoration:none; border-radius:8px; display:inline-block;">
                        ВЕРНУТЬСЯ В ПРИЛОЖЕНИЕ
                    </a>
                </div>`;
        }, 1000);
    </script>
</body>
</html>
