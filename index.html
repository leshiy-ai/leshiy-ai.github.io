<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/Gemini.png" type="image/png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Leshiy-AI Ecosystem</title>
  </head>
  <body>
    <div id="top"></div>
    
    <div id="sidebar"></div>
    
    <div class="app-container">
      <div id="root"></div>
    </div>

    <div id="footer"></div>

    <!-- Оверлей для Telegram авторизации -->
    <div id="tg_auth_overlay"></div>

    <!-- Модалка Хранилки -->
    <div id="storage-modal" class="storage-modal">
      <div class="storage-content"></div>
    </div>

    <!-- React Entry Point -->
    <script type="module" src="/src/main.jsx"></script>

    <!-- VK Bridge для нативных VK Mini Apps (ОБЯЗАТЕЛЬНО ОСТАВЛЯЕМ) -->
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <script>
      if (window.location.search.includes('vk_app_id')) {
        vkBridge.send('VKWebAppInit')
          .then(() => console.log('VK Mini App Init OK'))
          .catch(() => console.error('VK Mini App Init Fail'));
      }
    </script>

    <!-- Telegram Web App SDK (ОБЯЗАТЕЛЬНО ОСТАВЛЯЕМ) -->
    <script>
      (function loadTelegram() {
        try {
          var script = document.createElement('script');
          script.src = "https://telegram.org/js/telegram-web-app.js";
          script.async = true;
          script.onerror = function() {
            console.warn("Telegram SDK не загрузился, работаем без него.");
          };
          script.onload = function() {
            console.log("Telegram SDK успешно загружен.");
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.ready();
            }
          };
          document.head.appendChild(script);
        } catch (e) {
          console.error("Ошибка при попытке загрузить Telegram JS:", e);
        }
      })();
    </script>
  </body>
</html>
