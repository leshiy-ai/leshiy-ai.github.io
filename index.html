<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leshiy-AI Ecosystem</title>
    <script src="https://vk.com/js/api/openapi.js?169" type="text/javascript"></script>
    <script>
      (function handleVKAuth() {
          const hash = window.location.hash.substring(1);
          if (hash) {
              const params = new URLSearchParams(hash);
              const userId = params.get('user_id');
              const accessToken = params.get('access_token'); // Получаем токен из хэша

              if (userId && accessToken) {
                  localStorage.setItem('vk_user_id', userId);

                  // Делаем JSONP запрос к ВК, чтобы обойти CORS и получить данные профиля
                  const script = document.createElement('script');
                  script.src = `https://api.vk.com/method/users.get?user_ids=${userId}&fields=photo_100&access_token=${accessToken}&v=5.131&callback=vkCallback`;
                  document.head.appendChild(script);

                  window.vkCallback = function(response) {
                      if (response.response && response.response[0]) {
                          const user = response.response[0];
                          localStorage.setItem('vk_user_name', `${user.first_name} ${user.last_name}`);
                          localStorage.setItem('vk_user_photo', user.photo_100);
                          
                          // Уведомляем систему, что данные обновились
                          window.dispatchEvent(new CustomEvent('vk-auth-success', { detail: userId }));
                      }
                      delete window.vkCallback;
                      script.remove();
                  };

                  window.history.replaceState({}, document.title, window.location.pathname);
              }
          }
      })();
    </script>
  </head>
  <body>
    <div class="app-container">
      <div id="sidebar" class="sidebar">
        <div class="sidebar-top">
          <button id="toggle-menu" class="menu-btn">☰</button>
          <div class="new-chat">
            <span class="icon">➕</span>
            <span class="text">Новый чат</span>
          </div>
        </div>
      
        <div class="sidebar-middle">
          <div class="nav-item" id="open-storage">
            <span class="icon">🔒</span>
            <span class="text">Хранилище</span>
          </div>
        </div>
      
        <div class="sidebar-bottom">
          <div class="user-profile" title="Leshiy User (Online)">
            <div class="avatar-container">
              <img id="user-avatar" src="https://vk.com/images/camera_100.png" alt="Profile">
            </div>
            <div class="user-info">
              <span class="user-name" id="display-name">Leshiy User</span>
              <span class="user-status">● Online</span>
            </div>
          </div>
        </div>
      </div>

      <div id="root"></div>
    </div>

    <div id="vk_auth_overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); backdrop-filter:blur(4px); z-index:10000; justify-content:center; align-items:center;">
  
      <div id="vk_auth_box" style="background: white; padding: 24px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 90%; max-width: 360px; position: relative; animation: slideUp 0.3s ease-out;">
        
        <div style="text-align: center; margin-bottom: 20px;">
            <div style="font-size: 40px; margin-bottom: 10px;">🔐</div>
            <h3 style="margin: 0; font-family: sans-serif; color: #333;">Вход в Хранилку</h3>
            <p style="font-size: 14px; color: #666; margin-top: 8px;">Используйте VK ID для безопасного доступа к вашим файлам</p>
        </div>
    
        <div id="vk_auth_container"></div>
    
        <button onclick="document.getElementById('vk_auth_overlay').style.display='none'" style="width: 100%; margin-top: 15px; border: none; background: none; color: #0077ff; cursor: pointer; font-size: 14px;">Позже</button>
      </div>
    </div>

    <script src="https://unpkg.com/@vkid/sdk@<3.0.0/dist-sdk/umd/index.js"></script>
    <script type="module" src="/src/main.jsx"></script>

    <div id="storage-modal" class="storage-modal">
      <div class="storage-content">
          <div class="storage-header">
              <span>🗄️ Приложение "Хранилка" by Leshiy</span>
              <button id="close-storage" class="close-btn">×</button>
          </div>
          <iframe id="storage-frame"></iframe>
      </div>
  </div>
  </body>
</html>
